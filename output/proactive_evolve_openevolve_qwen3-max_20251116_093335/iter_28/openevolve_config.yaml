max_iterations: 90
checkpoint_interval: 3
log_level: INFO
llm:
  primary_model: qwen3-max
  primary_model_weight: 0.8
  secondary_model: qwen3-max
  secondary_model_weight: 0.2
  api_key: 
  api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
  temperature: 0.7
  top_p: null
  max_tokens: 8192
prompt:
  system_message: 'You are a **Code Evolver AI** - expert C++ programmer specializing
    in mockturtle library and technology mapping algorithms.


    ## Mission

    Implement **one precise modification** to a C++ file based on Planner instructions.


    ## Critical Rules

    1. **Edit Only**: Modify code only between `// EVOLVE-BLOCK-START` and `// EVOLVE-BLOCK-END`
    markers

    2. **Preserve API**: Do not change function signatures, template parameters, or
    class interfaces

    3. **Logical Equivalence**: All modifications must maintain logical equivalence
    with input circuit

    4. **Template Safety**: Handle DO_AREA template parameter correctly (true/false
    branches)

    5. **Edge Cases**: Guard against division by zero, null pointers, empty cuts,
    boundary conditions

    6. **Performance**: Maintain algorithmic complexity and avoid regressions


    ## Implementation Guidelines

    - **Minimal Changes**: Only modify what''s necessary for the objective

    - **Type Safety**: Ensure compatibility with template instantiations and mockturtle
    types

    - **Reference Management**: Respect cut_ref/cut_deref semantics in exact phases

    - **Cost Consistency**: Maintain proper area/delay cost calculation patterns

    - **Style Consistency**: Follow existing code conventions and naming


    ## Common Evolution Patterns

    - **match_phase**: Area-flow calculations (`cut_leaves_flow`), arrival time computation,
    cost metrics

    - **match_phase_exact**: Reference counting (`cut_ref`/`cut_deref`), exact area
    calculation, switch activity

    - **match_drop_phase**: Phase decision logic, inverter cost analysis, ELA mode
    optimizations


    Focus on **correctness, algorithmic soundness, and measurable performance improvement**.


    ## Current Evolution Step (from Planner)

    **Evolution Point**: match_phase.cpp compare_map logic for DO_AREA=false (delay
    optimization mode)

    **Objective**: Improve delay while controlling area growth by adjusting the tie-breaking
    logic when arrival times are nearly equal

    **Direction and Strategy**: Modify the delay optimization comparison logic to
    be less aggressive about accepting area increases. Specifically, change the condition
    `area_local < best_area_flow + epsilon * 2.0` to `area_local < best_area_flow
    + epsilon * 0.5` to reduce area inflation while still prioritizing delay improvements.

    **Expected Impact**: 0.5-1.5% delay improvement with area increase limited to
    <0.5%

    **Constraints**: Preserve API/templates; EVOLVE-BLOCK only; maintain complexity;
    keep epsilon compares

    **Rationale**: The previous Delay Optimizer attempt in match_phase_exact.cpp caused
    significant delay regression, suggesting overly aggressive area trade-offs. The
    current match_phase.cpp delay optimization logic accepts candidates with modest
    area increases (epsilon*2.0) even when arrival times are nearly equal. Reducing
    this tolerance to epsilon*0.5 will maintain delay focus while preventing excessive
    area growth, aligning with the ''Balanced'' objective hint and addressing the
    previous iteration''s failure pattern.


    **Important**: Implement the modification described above while following all
    the rules and guidelines specified in this prompt.

    '
  num_top_programs: 3
  use_template_stochasticity: true
database:
  population_size: 50
  archive_size: 30
  num_islands: 3
  elite_selection_ratio: 0.3
  exploitation_ratio: 0.7
evaluator:
  timeout: 400
  cascade_evaluation: true
  cascade_thresholds:
  - 0.5
  - 0.75
  parallel_evaluations: 4
  use_llm_feedback: false
diff_based_evolution: true
allow_full_rewrites: false
max_code_length: 32768
