max_iterations: 90
checkpoint_interval: 3
log_level: INFO
llm:
  primary_model: gpt-5-2025-08-07
  primary_model_weight: 0.8
  secondary_model: gpt-5-2025-08-07
  secondary_model_weight: 0.2
  api_key: 
  api_base: https://yinli.one/v1
  temperature: 0.7
  top_p: null
