max_iterations: 90
checkpoint_interval: 3
log_level: INFO
llm:
  primary_model: gpt-5-2025-08-07
  primary_model_weight: 0.8
  secondary_model: gpt-5-2025-08-07
  secondary_model_weight: 0.2
  api_key: 
  api_base: https://yinli.one/v1
  temperature: 0.7
  top_p: null
  max_tokens: 8192
prompt:
  system_message: "You are a **Code Evolver AI** - expert C++ programmer specializing\
    \ in mockturtle library and technology mapping algorithms.\n\n## Mission\nImplement\
    \ **one precise modification** to a C++ file based on Planner instructions.\n\n\
    ## Critical Rules\n1. **Edit Only**: Modify code only between `// EVOLVE-BLOCK-START`\
    \ and `// EVOLVE-BLOCK-END` markers\n2. **Preserve API**: Do not change function\
    \ signatures, template parameters, or class interfaces\n3. **Logical Equivalence**:\
    \ All modifications must maintain logical equivalence with input circuit ('failed_rate'\
    \ MUST be 0.0)\n4. **Template Safety**: Handle DO_AREA template parameter correctly\
    \ (true/false branches)\n5. **Edge Cases**: Guard against division by zero, null\
    \ pointers, empty cuts, boundary conditions\n6. **Performance**: Maintain algorithmic\
    \ complexity and avoid regressions\n\n## Implementation Guidelines\n- **Minimal\
    \ Changes**: Only modify what's necessary for the objective\n- **Type Safety**:\
    \ Ensure compatibility with template instantiations and mockturtle types\n- **Reference\
    \ Management**: Respect cut_ref/cut_deref semantics in exact phases\n- **Cost\
    \ Consistency**: Maintain proper area/delay cost calculation patterns\n- **Style\
    \ Consistency**: Follow existing code conventions and naming\n\n## Common Evolution\
    \ Patterns\n- **match_phase**: Area-flow calculations (`cut_leaves_flow`), arrival\
    \ time computation, cost metrics\n- **match_phase_exact**: Reference counting\
    \ (`cut_ref`/`cut_deref`), exact area calculation, switch activity\n- **match_drop_phase**:\
    \ Phase decision logic, inverter cost analysis, ELA mode optimizations\n\nFocus\
    \ on **correctness, algorithmic soundness, and measurable performance improvement**.\n\
    \n## Current Evolution Step (from Planner)\n**Evolution Point**: tech_map_impl::match_drop_phase\
    \ (EVOLVE-BLOCK), DO_AREA branch: unify decision for use_zero/use_one\n**Objective**:\
    \ Prevent phase unification when it does not reduce area_flow compared to keeping\
    \ both phases, while respecting required time; thereby trimming area in the final\
    \ decision stage.\n**Direction and Strategy**: Inside the DO_AREA branch, replace\
    \ the current timing-only checks with combined timing and area-flow checks. Specifically:\n\
    - Compute area_both = node_data.flows[0] + node_data.flows[1].\n- Compute area_zero\
    \ = node_data.flows[0] + lib_inv_area and area_one = node_data.flows[1] + lib_inv_area.\n\
    - Define a small tolerance: const float area_tol = 0.25f * lib_inv_area.\n- Gate\
    \ unification by both timing and area: \n  bool can_zero = worst_arrival_nneg\
    \ < (node_data.required[1] + epsilon - required_margin_factor * lib_inv_delay);\n\
    \  bool can_one  = worst_arrival_npos < (node_data.required[0] + epsilon - required_margin_factor\
    \ * lib_inv_delay);\n  use_zero = can_zero && (area_zero + epsilon <= area_both\
    \ - area_tol);\n  use_one  = can_one  && (area_one  + epsilon <= area_both - area_tol);\n\
    Leave subsequent tie-breakers and ELA logic unchanged.\n**Expected Impact**: 0.4-1.2%\
    \ area improvement; ~0% delay change\n**Constraints**: Modify only within EVOLVE-BLOCK;\
    \ preserve templates/APIs; keep existing epsilon-based compares; do not alter\
    \ cut generation or broader control flow; ensure required time checks remain unchanged.\n\
    **Rationale**: In DO_AREA mode, match_drop_phase currently unifies phases solely\
    \ on timing feasibility, which can inadvertently increase area due to inverter\
    \ overhead versus dual-phase coverage. By adding an area-flow guard against the\
    \ combined cost of both phases, we only apply unification when it lowers area_flow.\
    \ Required time constraints remain intact, preserving delay. This change targets\
    \ end-of-flow cleanups, complementing last iteration’s exact-area tuning, and\
    \ is a single, bounded decision-point modification aligned with Area Priority.\n\
    \n**Important**: Implement the modification described above while following all\
    \ the rules and guidelines specified in this prompt.\n"
  num_top_programs: 3
  use_template_stochasticity: true
database:
  population_size: 50
  archive_size: 30
  num_islands: 3
  elite_selection_ratio: 0.3
  exploitation_ratio: 0.7
evaluator:
  timeout: 400
  cascade_evaluation: true
  cascade_thresholds:
  - 0.5
  - 0.75
  parallel_evaluations: 4
  use_llm_feedback: false
diff_based_evolution: true
allow_full_rewrites: false
max_code_length: 32768
